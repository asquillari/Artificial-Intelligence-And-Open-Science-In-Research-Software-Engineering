name: CI

on:
  push:
  pull_request:

jobs:
  pipeline-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Start Grobid (Docker)
        run: |
          docker run -d --name grobid -p 8070:8070 lfoppiano/grobid:0.7.2
          # Esperar a que Grobid responda
          for i in {1..60}; do
            if curl -sSf http://localhost:8070/ > /dev/null; then
              echo "Grobid listo"
              break
            fi
            echo "Esperando Grobid..."
            sleep 2
          done

      - name: Run pipeline
        env:
          GROBID_URL: "http://localhost:8070/api/processFulltextDocument"
        run: |
          python src/download_pdfs.py
          python src/run_grobid.py
          python src/wordcloud_abstracts.py
          python src/count_figures.py
          python src/extract_links.py

      - name: Run tests
        run: |
          pytest

      - name: Stop Grobid
        if: always()
        run: |
          docker logs grobid || true
          docker rm -f grobid || true